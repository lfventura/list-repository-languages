name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: Semver bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      - run: npm test

      - name: Compute release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          CURRENT_TAG="$(git tag --list 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)"
          [[ -z "$CURRENT_TAG" ]] && CURRENT_TAG="v0.0.0"
          VERSION="${CURRENT_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          case "${{ inputs.bump_type }}" in
            major) ((MAJOR+=1)); MINOR=0; PATCH=0 ;;
            minor) ((MINOR+=1)); PATCH=0 ;;
            patch) ((PATCH+=1)) ;;
            *) echo "Unknown bump type" >&2; exit 1 ;;
          esac
          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "package_version=${NEW_VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Build distribution
        run: npm run build

      - name: Update package.json version
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.package_version }}
        run: |
          node -e "
          const fs=require('fs');
          const p=JSON.parse(fs.readFileSync('package.json','utf8'));
          p.version=process.env.PACKAGE_VERSION;
          fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');
          "

      - name: Sync package-lock.json version
        run: npm install --package-lock-only --ignore-scripts

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit release artifacts
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          # dist is gitignored (prevents accidental adds in PRs); the release
          # workflow is the only writer and force-adds it.
          git add -f dist
          git add package.json package-lock.json
          git diff --staged --quiet || git commit -m "chore(release): ${NEW_VERSION}"

      - name: Create git tag
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: git tag "${NEW_VERSION}"

      - name: Push release commit (dist + version) to main and tag
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        # The release workflow is the only writer of dist/: the release commit
        # (dist + version bump) lands on main together with the tag, so
        # dist@main always matches the latest release.
        run: git push origin HEAD:main "${NEW_VERSION}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: gh release create "${NEW_VERSION}" --title "${NEW_VERSION}" --generate-notes
